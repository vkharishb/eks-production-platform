apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: prod          # was missing — prod had no network isolation
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: prod          # was missing — prod had no network isolation
spec:
  podSelector:
    matchLabels:
      app: hello-app
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: hello-app
      ports:
        - port: 5678
          protocol: TCP
