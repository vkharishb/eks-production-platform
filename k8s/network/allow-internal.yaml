apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: dev
spec:
  podSelector:
    matchLabels:
      app: hello-app
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: hello-app   # was {} — matched ALL pods, defeating default-deny
      ports:
        - port: 5678
          protocol: TCP
