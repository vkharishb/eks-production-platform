replicaCount: 1

image:
  repository: hashicorp/http-echo
  tag: "0.4.0"           # pinned — was "latest" (unpredictable, cache-busting with IfNotPresent)
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 5678

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: ""            # override per-environment (see values-dev/prod)
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# HPA disabled by default — safest base; environments opt in explicitly
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

health:
  path: /
  port: 5678
