name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate Terraform, Helm, and Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform

      - name: Lint Helm chart
        run: helm lint helm/apps/hello-app

      - name: Render Helm chart with dev values
        run: |
          helm template hello-app helm/apps/hello-app \
            --namespace dev \
            --values helm/apps/hello-app/values.yml \
            --values helm/apps/hello-app/values-dev.yml

      - name: Render Helm chart with prod values
        run: |
          helm template hello-app helm/apps/hello-app \
            --namespace prod \
            --values helm/apps/hello-app/values.yml \
            --values helm/apps/hello-app/values-prod.yml

      - name: Build Docker image
        run: docker build --file docker/Dockerfile --tag hello-app:ci docker
