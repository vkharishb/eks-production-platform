name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Terraform, Helm, Docker, and image scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform

      - name: Terraform init and validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: terraform/envs/dev

      - name: Lint Helm chart
        run: helm lint helm/apps/hello-app

      - name: Render Helm chart with dev values
        run: |
          helm template hello-app helm/apps/hello-app \
            --namespace dev \
            --values helm/apps/hello-app/values.yaml \
            --values helm/apps/hello-app/values-dev.yml

      - name: Render Helm chart with prod values
        run: |
          helm template hello-app helm/apps/hello-app \
            --namespace prod \
            --values helm/apps/hello-app/values.yaml \
            --values helm/apps/hello-app/values-prod.yml

      - name: Build Docker image
        run: docker build --file docker/Dockerfile --tag hello-app:ci .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: hello-app:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
